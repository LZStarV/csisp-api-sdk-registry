syntax = "proto3";

// 集成服务演示
package integrated.server;

// 演示服务
service DemoService {
  // 获取演示信息
  rpc GetDemoInfo (GetDemoInfoRequest) returns (GetDemoInfoResponse);
}

// 获取演示信息请求参数
message GetDemoInfoRequest {
  // 演示ID
  string demo_id = 1;
  // 是否返回扩展信息
  bool with_extra = 2;
}

// 获取演示信息响应结果
message GetDemoInfoResponse {
  // 演示信息
  DemoInfo demo_info = 1;
  // 响应码
  int32 code = 2;
  // 响应信息
  string message = 3;
}

// 演示信息结构体
message DemoInfo {
  string demo_id = 1;
  string title = 2;
  string description = 3;
  int64 create_time = 4; // 时间戳（毫秒）
}